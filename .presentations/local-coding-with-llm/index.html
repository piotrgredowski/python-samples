## model formats

MLX = Metal Language Acceleration. GGUF = GPT-Generated Unified Format.
<aside class="notes">
MLX is Apple's format/runtime path for Apple Silicon, optimized for Metal and usually best on Mac.
GGUF is a portable llama.cpp ecosystem format with quantization + metadata, widely available across platforms.
Use MLX when you are all-in on Mac performance; use GGUF for portability and broad tooling support.
</aside>

<div class="formats-compare">
<span class="fragment formats-focus-trigger" aria-hidden="true"></span>
<table>
  <thead>
    <tr>
      <th class="mlx-col">MLX</th>
      <th class="gguf-col">GGUF</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td class="mlx-col">• Apple Silicon optimized.<br>• faster on M1/M2/M3.<br>• native Metal GPU.</td>
      <td class="gguf-col">• universal.<br>• flexible quantization.<br>• llama.cpp ecosystem.</td>
    </tr>
  </tbody>
</table>
</div>

## how i work

no: "build me an entire app in one shot"

yes: "specific, small features"

tdd-ish approach

tests first, then code

collect knowledge when online, use it when offline

context management is key

---

## skills/extensions for agents

- `qmd` is great for building and searching my offline skills knowledge base (`~/.agents/knowledge`).
- `collaborative-tdd` skill for structured test-first work.
- `rtk` extension compresses CLI output before it reaches the agent, reducing token usage and keeping context cleaner.

---

## summary

- LM Studio + Qwen 3.5 9B + Qwen 3.5 27B
- pi (sometimes also droid) = main agent
- tdd + small tasks
- skills
- offline? not a (big) problem.
